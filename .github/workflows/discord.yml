name: Discord Notifications

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, ready_for_review]

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
    steps:
      - name: Send Discord notification
        if: ${{ env.DISCORD_WEBHOOK != '' }}
        uses: rjstone/discord-webhook-notify@v2
        with:
          webhookUrl: ${{ env.DISCORD_WEBHOOK }}
          text: |
            ${{ github.event_name == 'pull_request' && format('📥 **{0}** opened/updated a PR', github.actor) || format('🚀 **{0}** pushed to **{1}**', github.actor, github.ref_name) }}
            📦 Repo: ${{ github.repository }}
            🔗 ${{ github.event_name == 'pull_request' && github.event.pull_request.html_url || format('https://github.com/{0}/commit/{1}', github.repository, github.sha) }}